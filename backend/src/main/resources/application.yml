spring:
  application:
    name: margin
  # Local dev uses in-memory H2; production swaps in Postgres via env overrides.
  datasource:
    url: jdbc:h2:mem:margin;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  ai:
    openai:
      api-key: ${GEMINI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        options:
          model: models/gemini-3.1-flash-lite
          temperature: 0.2

margin:
  github:
    token: ${GITHUB_TOKEN:}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:4200}

server:
  port: 8080

logging:
  level:
    com.margin: DEBUG
    org.springframework.ai: DEBUG
